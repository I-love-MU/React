<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        let str = "안녕하세요";
        console.log(typeof str);
        console.log(str);

        let num = 123;
        console.log(typeof num);
        console.log(num);

        let boo = true;
        console.log(typeof boo);
        console.log(boo);

        let fun = function() {
            document.write(" <h1>안녕하세요</h1>");
        };
        fun();

        let obj = {
            name: '홍길동',
            age: 20,
        };

        console.log(typeof obj);
        console.log(obj);
        console.log(obj.name);  // 존재하는 key 사용
        console.log(obj.age);

        let undef; // 선언만 하고 초기화되지 않음
        console.log(typeof undef);
        console.log(undef);
    </script>
</head>
<body>
    
</body>
</html>
