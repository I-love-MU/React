<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        let arr = [1, 2, 3, 4, 5];

        // pop()
        console.log(arr.pop())
        console.log(arr)
        
        // sort()
        console.log(arr.sort())
        console.log(arr)
        
        // find()
        let result = arr.find((item) => item > 2);
        console.log(result);

        
        // forEach()
        arr.forEach( function (item, index) {
            console.log(item.index)
        });

        // filter()
        let evenNums = arr.filter(function (item) {
            return item % 2 == 0;
        });
        console.log(evenNums);

        // map()
        sums = arr.map(function(item, index) {
            return item * 2;
        });
        console.log(sums)

        // for of
        arr = ['사과', '참외'];
        for (let str of arr) {
            console.log(str);
        }
    </script>
</head>

</body>
</html>
