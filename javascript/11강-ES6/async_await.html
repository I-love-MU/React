        // 프로미스 객체를 반환하는 함수
        function delay(ms){
            return new Promise((resolve)=>{
                setTimeout(() => {
                    console.log(`${ms} 밀리초가 지났습니다.`);
                    resolve();
                }, ms);
            })
        }

        // async/await은 promise 객체를 리턴하는 함수 앞에 await이 붙음.
        async function main(){
            await delay(1000);
            await delay(2000);
            const result = await Promise.resolve("끝")
            console.log(result)
        }
        
        main();
