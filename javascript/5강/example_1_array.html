        // 배열 객체 메서드
        // shift(), pop()
        arr = new Array("가", "나", "다", "라", "마");
        console.log(arr.pop());
        console.log(arr);

        console.log(arr.shift());
        console.log(arr);

        // push()
        arr.push('바');
        console.log(arr);

        // unshift()
        arr.unshift('A');
        console.log(arr);

        // sort()
        arr = new Array("E", "B", "A", "C", "D");
        console.log(arr.sort());
        console.log(arr);

        // a = [1,2]
        // b = [2,4]

        // concat()
        arr = new Array("ABC", "DEF", "GHI", "JKL");
        let arr3 = new Array("가나다", "라마바", "사아자", "차카파");
        console.log(arr.concat(arr3));
        console.log(arr);

        // join()
        console.log(arr.join());

        // forEach(), for
        // map, filter

        arr.forEach( function (item, index) {
            console.log(item,index);
        });

        let arrNums = [1,2,3];

        sums = arrNums.map(function(item, index) {
            return item * 2;
        });
        console.log(sums);

        let evenNums = arrNums.filter(function (item) {
            return item % 2 == 0;
        });
