<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style></style>
    <script>
        // 1. ES6(modern javascript) 관점에서의 데이터 타입 분류
        //    수치 (Number) : 1, 2.5, ...
        const a = 10;
        const b = 0.2;
        console.log(typeof a);
        console.log(typeof b);

        console.log(parseInt(b));
        console.log(parseFloat(a));

        // 2^53 - 1 보다 큰 정수
        const theBiggestInt = 9007199254740991n;
        const alsoHuge = BigInt(9007199254740991);

        // 2. null / undefined / NaN 차이 = falsy(false 값) value

        let num = 1;
        console.log(typeof num);
        
        let num2 = null; // 메모리에 방은 있으나, 할당된 값이 없음
        console.log(typeof num2);
        
        let num3 = null; // 메모리에 방조차 없음
        console.log(typeof num3);
        
        let num4 = 100 + '200'; // 문자열로 변환
        console.log(typeof num4);

        let num5 = +'100';
        console.log(typeof num5)
        
        let num6 = +"ABC";
        console.log(num6)

        let num7;
        console.log(num7); // undefined
        console.log(typeof num7); // "undefined"

        // if(false){}
        // if(null)
        // if(undefined)
        // if(0)
        // if(NaN)
        // if('A')

        // 화살표 함수
        const fun1 = (value) => {
            return value
        }
        console.log(3);
        console.log(fun1('안녕')); // 안녕

        // 괄호로 감싸서 모은 뒤 생략해서 반환
        const fun2 = (val1, val2) => ({name:val1, age:val2});

        // 3. 분할 대입 {} []
        const myProfile = {
            name: "seungineer",
            age: 24,
        };

        const message = `저의 닉네임은 ${myProfile.name}이고, ${myProfile.age}살입니다.`
        console.log(message) // 저의 닉네임은 seungineer이고, 24살입니다.
        
        // 4. 객체 분할 대입
        const { name, age } = myProfile;
        message = `저의 닉네임은 ${name}이고, ${age}살입니다.`
        console.log(message) // 저의 닉네임은 seungineer이고, 24살입니다.
        
        // 배열 구조 분해
        const profile = ['홍길동', 28];
        const [name1, age1] = profile;
        message = `저의 닉네임은 ${name1}이고, ${age1}살입니다.`;
        console.log(message); // 저의 닉네임은 홍길동이고, 28살입니다.

        // 4. 디폴트값 = 매개변수에 기본값 설정가능
        const sayHello = (name = '홍기롱') => {
            console.log(`안녕하세요, ${name}`);
        };
        sayHello(); // 안녕하세요, 홍기롱

        // 객체 구조 분해 및 디폴트값 설정
        const person = {
            age: 24
        };
        const { name2 = '홍길동2', age: age2 } = person;

        console.log(`이름: ${name2}, 나이: ${age2}`); // 이름: 홍길동2, 나이: 24
    </script>
</head>
<body>
    
</body>
</html>
