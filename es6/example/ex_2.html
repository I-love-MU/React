    <script>

        //5.스프레드 구문 ... =  배열이나 객체에 이용
        const arr1 = [1, 2];
        console.log(arr1);
        console.log(...arr1); // 1 2 요소 전개

        const arr = [1, 2];
        const fun1 = (val1, val2) => val1 + val2;

        console.log(fun1(arr[0], arr[1])); //3
        console.log(fun1(...arr)); //3

        //요소 모으기
        const arr2 = [1, 2, 3, 4, 5];
        const [num1, num2, ...left] = arr2;

        console.log(num1); //1

        };

        };

        // == 값을 비교, === 값 그리고 해당 값의 타입까지 비교
        if (100 == '100') {
            document.write('true일까' + '<br>');
        }

        if (100 === '100') {
