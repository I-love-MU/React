<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Bootstrap demo</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
            crossorigin="anonymous"
        />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
      <section class="container">
        <div 
          class="d-flex justify-content-center align-items-center vh-100"
        >
          <div 
            class="card mb-3 bg-light bg-opacity-75" 
            style="max-width: 540px"
          >
              <div class="row g-0 justify-content-center align-items-center vh-100">
                  <div class="col-6 col-md-4">
                      <img 
                          class="img-fluid rounded-circle p-4 p-sm-3"
                          src="images/profile.jpg"
                          class="img-fluid rounded-start"
                          alt="..."
                      />
                  </div>
                  <div class="col-md-8">
                      <div class="card-body text-center text-sm-start">
                        <p class="mb-2">디지털 아티스트</p>
                        <h5 class="card-title">에릭 킴에밀리아</h5>
                              This is a wider card with supporting text below
                              as a natural lead-in to additional content. This
                              content is a little bit longer.
                          </p>
                          <p class="card-text">
                              <small class="text-muted"
                                  >Last updated 3 mins ago</small
                              >
                          </p>
                          <a href="#" class="btn btn-dark rounded-pill"><i class="bi bi-house"></i></a>
                          <a href="#" class="btn btn-danger rounded-pill"><i class="bi bi-youtube"></i></a>
                          <a href="#" class="btn btn-primary rounded-pill"><i class="bi bi-facebook"></i></a>
                          <a href="#" class="btn btn-warning rounded-pill"><i class="bi bi-instagram"></i></a>

                      </div>
                  </div>
              </div>
          </div>
      </div>
    </section>
    </body>
</html>
