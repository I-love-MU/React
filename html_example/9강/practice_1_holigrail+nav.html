<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #wrap {
            width: 960px;
            margin: 0 auto;
            border: 1px solid #cccccc;
            overflow: hidden;
            text-align: center;
        }

        header {
            width: 960px;
            height: 120px;
            text-align: center;
            line-height: 120px;
        }
        
        nav {
            width: 960px;
            height: 80px;
            text-align: center;
        }

        #menu {
            float: left;
            border: 1px solid #cccccc;
            overflow: hidden;
        }
        
        section {
            width: 80%;
            height: 300px;
            text-align: center;
            float: left;
        }

        aside {
            width: 20%;
            height: 300px;
            float: right;
        }

        footer {
            width: 960px;
            height: 100px;
            line-height: 120px;
        }
    </style>
</head>
<body>
    <div id="wrap">
        <header>HEADER</header>
        <nav>
            <div>NAVIGATION</div>
            <div id="menu">
                <p>menu1</p>
                <p>menu2</p>
                <p>menu3</p>
                <p>menu4</p>
                <p>menu5</p>
            </div>
        </nav>
        <section>CONTENT</section>
        <aside>BANNER</aside>
        <footer>FOOTER</footer>
    </div>
</body>
</html>
